services:
  - type: web
    name: alles-kaufen-system
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.cjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false # You will paste your Supabase URL manually in the Render Dashboard
