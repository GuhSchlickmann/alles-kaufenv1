services:
  - type: web
    name: alles-kaufen-system
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server.cjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: alles-db
          property: connectionString

databases:
  - name: alles-db
    plan: free
